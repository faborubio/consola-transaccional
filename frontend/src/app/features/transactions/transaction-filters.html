<div class="card mb-3">
  <div class="card-body py-3">
    <div class="row g-3 align-items-end">
      <div class="col-12 d-flex flex-wrap gap-3 align-items-center">
        <span class="fw-semibold small text-secondary">Estado:</span>
        @for (s of statuses; track s) {
          <div class="form-check form-check-inline mb-0">
            <input
              class="form-check-input"
              type="checkbox"
              [id]="'st-' + s"
              [checked]="statusActive(s)"
              (change)="toggleStatus(s, $any($event.target).checked)"
            />
            <label class="form-check-label small" [for]="'st-' + s">{{ s }}</label>
          </div>
        }
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1" for="f-type">Tipo</label>
        <select
          id="f-type"
          class="form-select form-select-sm"
          [value]="param('type')"
          (change)="setParam('type', $any($event.target).value)"
        >
          <option value="">Todos</option>
          @for (t of types; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1" for="f-currency">Moneda</label>
        <select
          id="f-currency"
          class="form-select form-select-sm"
          [value]="param('currency')"
          (change)="setParam('currency', $any($event.target).value)"
        >
          <option value="">Todas</option>
          @for (c of currencies; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1" for="f-min">Monto mín.</label>
        <input
          id="f-min"
          type="number"
          min="0"
          class="form-control form-control-sm"
          placeholder="0"
          [value]="param('minAmount')"
          (input)="setDebounced('minAmount', $any($event.target).value)"
        />
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1" for="f-max">Monto máx.</label>
        <input
          id="f-max"
          type="number"
          min="0"
          class="form-control form-control-sm"
          placeholder="∞"
          [value]="param('maxAmount')"
          (input)="setDebounced('maxAmount', $any($event.target).value)"
        />
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1" for="f-from">Desde</label>
        <input
          id="f-from"
          type="date"
          class="form-control form-control-sm"
          [value]="param('dateFrom')"
          (change)="setParam('dateFrom', $any($event.target).value)"
        />
      </div>

      <div class="col-6 col-md-2">
        <label class="form-label small mb-1" for="f-to">Hasta</label>
        <input
          id="f-to"
          type="date"
          class="form-control form-control-sm"
          [value]="param('dateTo')"
          (change)="setParam('dateTo', $any($event.target).value)"
        />
      </div>

      <div class="col-12 col-md-4">
        <label class="form-label small mb-1" for="f-cp">Contraparte (prefijo)</label>
        <input
          id="f-cp"
          type="search"
          class="form-control form-control-sm"
          placeholder="Nombre o número de cuenta…"
          [value]="param('counterparty')"
          (input)="setDebounced('counterparty', $any($event.target).value)"
        />
      </div>

      <div class="col-6 col-md-3">
        <label class="form-label small mb-1" for="f-sort">Ordenar por</label>
        <select
          id="f-sort"
          class="form-select form-select-sm"
          [value]="param('sort') || '-createdAt'"
          (change)="setParam('sort', $any($event.target).value)"
        >
          @for (s of sorts; track s.value) {
            <option [value]="s.value">{{ s.label }}</option>
          }
        </select>
      </div>

      <div class="col-6 col-md-2">
        @if (hasFilters) {
          <button class="btn btn-outline-secondary btn-sm w-100" (click)="clearAll()">
            Limpiar filtros
          </button>
        }
      </div>
    </div>
  </div>
</div>
