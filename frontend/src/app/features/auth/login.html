<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm" style="width: 24rem">
    <div class="card-body p-4">
      <h1 class="h4 mb-1">Consola de Operaciones</h1>
      <p class="text-secondary small mb-4">Acceso al back-office transaccional</p>

      <form (ngSubmit)="submit()">
        <div class="mb-3">
          <label class="form-label" for="username">Usuario</label>
          <input
            id="username"
            name="username"
            class="form-control"
            [(ngModel)]="username"
            autocomplete="username"
            required
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            [(ngModel)]="password"
            autocomplete="current-password"
            required
          />
        </div>

        @if (error(); as msg) {
          <div class="alert alert-danger py-2 small" role="alert">{{ msg }}</div>
        }

        <button class="btn btn-primary w-100" type="submit" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Ingresar
        </button>
      </form>

      <p class="text-secondary small mt-3 mb-0">
        Demo: operador1 / supervisor1 / auditor1 — contraseña <code>Demo1234!</code>
      </p>
    </div>
  </div>
</div>
