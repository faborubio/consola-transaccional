name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [transactions, auth]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Instalar dependencias
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Tests (pytest)
        run: uv run pytest -q

  integracion:
    name: Integración sobre Mongo real (índices, paginación, auth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Levantar Mongo replica set
        # `run` arranca mongo (espera su healthcheck), ejecuta el init en
        # foreground y propaga su exit code — `compose wait` no sirve para
        # one-shots que ya salieron.
        run: docker compose -f infra/docker-compose.yml run --rm mongo-init
      - name: Seed reducido (los planes de query no necesitan 500k)
        working-directory: infra/seed
        run: uv run seed.py --count 20000 --drop
      - name: Tests de índices y caminata de páginas
        working-directory: services/transactions
        run: |
          uv sync --frozen
          uv run pytest tests/test_indexes.py tests/test_pagination_walk.py -q
      - name: Flujo de auth (login, rotación, reuso) contra Mongo
        working-directory: services/auth
        run: |
          uv sync --frozen
          uv run pytest -q

  anti-drift:
    name: Candado anti-drift (contrato vs runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Exportar OpenAPI runtime de transactions
        working-directory: services/transactions
        run: |
          uv sync --frozen
          PYTHONPATH=. uv run python scripts/export_openapi.py > /tmp/txn-openapi.json
      - name: Exportar OpenAPI runtime de auth
        working-directory: services/auth
        run: |
          uv sync --frozen
          PYTHONPATH=. uv run python scripts/export_openapi.py > /tmp/auth-openapi.json
      - name: Diff transactions contra contracts/openapi.yaml
        # La superficie comparada crece por fase; /transitions entra en Fase 4.
        run: |
          uv run --script infra/ci/check_drift.py \
            contracts/openapi.yaml /tmp/txn-openapi.json \
            --match-path '^/(health$|transactions$|transactions/\{id\}(/audit)?$)'
      - name: Diff auth contra contracts/openapi.yaml
        run: |
          uv run --script infra/ci/check_drift.py \
            contracts/openapi.yaml /tmp/auth-openapi.json \
            --match-path '^/auth/'

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (eslint)
        run: npx ng lint
      - name: Tests (vitest)
        run: npx ng test
      - name: Build producción
        run: npx ng build

  docker:
    name: Build de imágenes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [transactions, auth]
    steps:
      - uses: actions/checkout@v5
      - name: Build imagen ${{ matrix.service }}
        run: docker build services/${{ matrix.service }}
