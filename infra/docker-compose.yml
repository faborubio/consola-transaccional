name: consola-transaccional

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transactions
      - auth
    networks: [backend]

  transactions:
    build: ../services/transactions
    environment:
      TXN_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0&directConnection=true
      TXN_MONGO_DB: transactions_db
      # Solo la clave PÚBLICA: este servicio verifica tokens, no los emite.
      TXN_JWT_PUBLIC_KEY_FILE: /keys/jwt-public.pem
      TXN_REDIS_URI: redis://redis:6379/0
    volumes:
      - ./keys/jwt-public.pem:/keys/jwt-public.pem:ro
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks: [backend]

  auth:
    build: ../services/auth
    # La clave privada montada es 0600 del usuario host; el contenedor debe
    # correr con ese uid para leerla (no se relajan los permisos de la clave).
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      AUTH_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0&directConnection=true
      # Base separada de transactions: sin monolito distribuido.
      AUTH_MONGO_DB: auth_db
      AUTH_JWT_PRIVATE_KEY_FILE: /keys/jwt-private.pem
      AUTH_JWT_PUBLIC_KEY_FILE: /keys/jwt-public.pem
    volumes:
      - ./keys:/keys:ro
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [backend]

  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [backend]

  # Inicializa el replica set de un nodo — sin esto NO hay transacciones
  # multi-documento y la Fase 4 falla en runtime (ver plan, Fase 0).
  mongo-init:
    image: mongo:7
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./mongo-init/init-replica.js:/init-replica.js:ro
    entrypoint: ["mongosh", "--host", "mongo:27017", "--file", "/init-replica.js"]
    networks: [backend]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [backend]

volumes:
  mongo-data:

networks:
  backend:
