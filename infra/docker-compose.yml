name: consola-transaccional

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transactions
    networks: [backend]

  transactions:
    build: ../services/transactions
    environment:
      TXN_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0&directConnection=true
      TXN_MONGO_DB: transactions_db
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks: [backend]

  # auth se integra en Fase 2 (JWT RS256); el scaffold ya existe en /services/auth

  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [backend]

  # Inicializa el replica set de un nodo — sin esto NO hay transacciones
  # multi-documento y la Fase 4 falla en runtime (ver plan, Fase 0).
  mongo-init:
    image: mongo:7
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./mongo-init/init-replica.js:/init-replica.js:ro
    entrypoint: ["mongosh", "--host", "mongo:27017", "--file", "/init-replica.js"]
    networks: [backend]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [backend]

volumes:
  mongo-data:

networks:
  backend:
