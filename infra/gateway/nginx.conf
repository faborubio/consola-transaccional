worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Rate limiting centralizado en la única puerta de entrada.
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  # Login mucho más estricto: superficie de fuerza bruta.
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_status 429;

  # CORS centralizado: el frontend (localhost:4200 en dev) habla solo con el gateway.
  map $http_origin $cors_origin {
    default "";
    "http://localhost:4200" $http_origin;
  }

  upstream transactions {
    server transactions:8000;
  }

  upstream auth {
    server auth:8000;
  }

  server {
    listen 8080;

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotency-Key, X-Correlation-Id" always;

    # El 429 debe cumplir el contrato (esquema Error + Retry-After), no la
    # página HTML por defecto de nginx. Retry-After es una aproximación
    # estática: la zona más estricta (login, 10r/m) libera cupo cada ~6s.
    error_page 429 = @rate_limited;
    location @rate_limited {
      default_type application/json;
      # add_header en un location anula la herencia: se repiten los de CORS.
      add_header Access-Control-Allow-Origin $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotency-Key, X-Correlation-Id" always;
      add_header Retry-After 10 always;
      return 429 '{"code":"RATE_LIMITED","message":"Límite de solicitudes excedido."}';
    }

    location = /auth/login {
      if ($request_method = OPTIONS) {
        return 204;
      }
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Correlation-Id $http_x_correlation_id;
    }

    location /auth/ {
      if ($request_method = OPTIONS) {
        return 204;
      }
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Correlation-Id $http_x_correlation_id;
    }

    location / {
      if ($request_method = OPTIONS) {
        return 204;
      }
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://transactions;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Correlation-Id $http_x_correlation_id;
    }
  }
}
